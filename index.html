<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Links</title>
    <meta
      name="description"
      content="프로필, 소셜 미디어, 콘텐츠, 문의 링크를 한곳에 모은 링크트리 페이지입니다."
    />
    <style>
      :root {
        --ink: #171717;
        --muted: #66635f;
        --paper: #fbfaf6;
        --line: rgba(23, 23, 23, 0.14);
        --teal: #0f766e;
        --coral: #ef6f61;
        --gold: #d5a021;
        --white: #ffffff;
        --shadow: 0 18px 48px rgba(23, 23, 23, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family:
          Inter, Pretendard, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(239, 111, 97, 0.22), transparent 30%),
          radial-gradient(circle at 78% 6%, rgba(15, 118, 110, 0.2), transparent 28%),
          linear-gradient(145deg, #fbfaf6 0%, #f1eee6 54%, #e9f3ef 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(100%, 520px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 32px 20px 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .profile {
        text-align: center;
        padding: 18px 0 16px;
      }

      .avatar-wrap {
        width: 128px;
        height: 128px;
        margin: 0 auto 18px;
        border-radius: 50%;
        padding: 5px;
        background: conic-gradient(from 180deg, var(--teal), var(--coral), var(--gold), var(--teal));
        box-shadow: var(--shadow);
      }

      .avatar {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid var(--paper);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 1.05;
        font-weight: 850;
        letter-spacing: 0;
      }

      .handle {
        margin: 10px 0 0;
        color: var(--teal);
        font-weight: 750;
      }

      .bio {
        max-width: 36ch;
        margin: 12px auto 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }

      .link {
        min-height: 64px;
        display: grid;
        grid-template-columns: 42px 1fr 28px;
        align-items: center;
        gap: 12px;
        padding: 12px 16px 12px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 24px rgba(23, 23, 23, 0.08);
        backdrop-filter: blur(14px);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .link:hover,
      .link:focus-visible {
        border-color: rgba(15, 118, 110, 0.55);
        box-shadow: 0 16px 34px rgba(23, 23, 23, 0.13);
        transform: translateY(-2px);
        outline: none;
      }

      .icon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: var(--white);
        font-weight: 850;
        background: var(--ink);
      }

      .icon.teal {
        background: var(--teal);
      }

      .icon.coral {
        background: var(--coral);
      }

      .icon.gold {
        background: var(--gold);
      }

      .text {
        min-width: 0;
      }

      .title {
        display: block;
        font-weight: 800;
        line-height: 1.2;
      }

      .desc {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.35;
      }

      .arrow {
        justify-self: end;
        color: var(--muted);
        font-size: 1.45rem;
        line-height: 1;
      }

      .featured {
        border-color: rgba(239, 111, 97, 0.45);
        background: #171717;
        color: var(--white);
      }

      .featured .desc,
      .featured .arrow {
        color: rgba(255, 255, 255, 0.72);
      }

      .footer {
        margin-top: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 0.84rem;
      }

      @media (max-width: 380px) {
        .page {
          padding-inline: 14px;
        }

        .link {
          grid-template-columns: 38px 1fr 22px;
          padding-right: 12px;
        }

        .icon {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="profile" aria-label="프로필">
        <div class="avatar-wrap">
          <img class="avatar" src="./profile-visual.png" alt="프로필 이미지" />
        </div>
        <h1>나의 링크</h1>
        <p class="handle">@yourname</p>
        <p class="bio">
          작업, 콘텐츠, 소셜 채널, 문의 링크를 한곳에 모았습니다. 원하는 버튼을 눌러
          바로 이동하세요.
        </p>
      </section>

      <nav class="links" aria-label="주요 링크">
        <a class="link featured" href="https://example.com" target="_blank" rel="noreferrer">
          <span class="icon coral">★</span>
          <span class="text">
            <span class="title">대표 링크</span>
            <span class="desc">가장 먼저 보여주고 싶은 페이지</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="https://instagram.com" target="_blank" rel="noreferrer">
          <span class="icon teal">IG</span>
          <span class="text">
            <span class="title">Instagram</span>
            <span class="desc">사진, 일상, 최신 소식</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="https://youtube.com" target="_blank" rel="noreferrer">
          <span class="icon coral">YT</span>
          <span class="text">
            <span class="title">YouTube</span>
            <span class="desc">영상 콘텐츠와 플레이리스트</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="https://blog.example.com" target="_blank" rel="noreferrer">
          <span class="icon gold">B</span>
          <span class="text">
            <span class="title">Blog</span>
            <span class="desc">글, 노트, 프로젝트 기록</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="mailto:hello@example.com">
          <span class="icon">✉</span>
          <span class="text">
            <span class="title">Contact</span>
            <span class="desc">협업 및 문의 메일 보내기</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
      </nav>

      <footer class="footer">© 2026 Your Name</footer>
    </main>
  </body>
</html>
